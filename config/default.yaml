# Eridian Configuration File
# Real-time 3D Gaussian Splatting Pipeline

# Camera Settings
camera:
  # Target processing resolution (lower = faster, higher = better quality)
  width: 640
  height: 480
  # Horizontal field of view in degrees
  fov_deg: 77.0
  # Target FPS (system will try to maintain this)
  target_fps: 15

# Depth Estimation
depth:
  # Model options: "MiDaS_small" (fast), "DPT_Hybrid" (better quality)
  model: "MiDaS_small"
  # Depth range in meters
  min_depth: 0.1
  max_depth: 8.0
  # Disparity thresholds (0-1 range)
  min_disparity: 0.05
  max_disparity: 0.92

# Point Cloud / Gaussian Splat
splat:
  # Maximum number of points to maintain
  max_points: 800000
  # Sample every Nth pixel (lower = denser, higher = faster)
  point_step: 4
  # Output directory
  output_dir: "./splat"

# Performance & Memory
performance:
  # Save interval (frames)
  save_interval: 30
  # Backup interval (frames) - creates timestamped files
  backup_interval: 150
  # Downsample threshold - when to start removing old points
  downsample_ratio: 0.8
  # Number of frames between downsampling checks
  downsample_interval: 8

# SLAM / Pose Tracking
slam:
  # Number of feature points to track
  max_features: 500
  # Feature detection quality level (0.01-1.0)
  feature_quality: 0.03
  # Minimum distance between features (pixels)
  feature_min_distance: 7
  # Refresh features every N frames
  feature_refresh_interval: 20
  # RANSAC threshold for essential matrix
  ransac_threshold: 1.0

# Visualization
visualization:
  # Show depth map overlay in capture window
  show_depth_by_default: false
  # Update 3D viewer every N frames (lower = smoother, higher = faster)
  viewer_update_interval: 30
  # Rerun viewer settings
  rerun_app_name: "eridian"
  rerun_spawn: true

# Logging
logging:
  # Log level: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
  # Enable console output
  console: true
  # Log FPS statistics every N frames
  fps_update_interval: 20

# Advanced
advanced:
  # Camera device index (0 = auto-detect best)
  camera_index: -1
  # Enable CUDA acceleration if available
  enable_cuda: true
  # Enable MPS (Apple Silicon) if available
  enable_mps: true
  # Thread count for processing (0 = auto)
  worker_threads: 0